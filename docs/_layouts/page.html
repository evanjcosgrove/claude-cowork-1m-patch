<script>
  (function () {
    var el = document.getElementById('gh-stars');
    if (!el) return;
    fetch('https://api.github.com/repos/evanjcosgrove/claude-cowork-1m-patch', { headers: { 'Accept': 'application/vnd.github+json' } })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) { if (d && typeof d.stargazers_count === 'number') el.textContent = d.stargazers_count; })
      .catch(function () { /* keep placeholder */ });
  })();
</script>
